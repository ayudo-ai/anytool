name: Deploy Anytool Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'anytool/**'
      - 'registry/**'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'

jobs:
  # ===============================
  # PRODUCTION - US
  # ===============================
  deploy-prod-us:
    runs-on: ec2-prod-anytool

    steps:
      - name: Deploy Anytool (Production US)
        run: |
          set -e
          cd /home/ubuntu/anytool

          echo "Deploying ANYTOOL PRODUCTION US..."
          git fetch origin
          git checkout main
          git reset --hard origin/main

          source venv/bin/activate || true
          pip install -r requirements.txt

          sudo systemctl restart anytool
          echo "Anytool production US deploy complete."
