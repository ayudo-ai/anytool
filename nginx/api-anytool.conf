# Nginx config for api-anytool.ayudo.ai
# Copy this to /etc/nginx/sites-available/api-anytool.ayudo.ai
# Then: ln -s /etc/nginx/sites-available/api-anytool.ayudo.ai /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api-anytool.ayudo.ai;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-anytool.ayudo.ai;

    # SSL — update paths to match your cert location
    # If using certbot: sudo certbot --nginx -d api-anytool.ayudo.ai
    ssl_certificate     /etc/letsencrypt/live/api-anytool.ayudo.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-anytool.ayudo.ai/privkey.pem;

    # Proxy all requests to anytool server on port 8100
    location / {
        # Handle CORS preflight (OPTIONS) at nginx level
        # This ensures the preflight never gets blocked
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass CORS headers from FastAPI through
        # (FastAPI CORSMiddleware handles the actual CORS for non-preflight)
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        proxy_pass_header Access-Control-Allow-Credentials;

        # Timeouts for long-running actions
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # WebSocket support (if needed for future features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
