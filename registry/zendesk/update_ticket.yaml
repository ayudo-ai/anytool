# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: zendesk_update_ticket
app: zendesk
description: Update a ticket's status, priority, assignee, or add a comment. Include 'comment' to add a reply. Set 'public'
  on the comment to control visibility.
method: PUT
path: /api/v2/tickets/{ticket_id}
base_url: https://{subdomain}.zendesk.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
  inject_from_metadata:
    subdomain: subdomain
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      status:
        type: string
        description: '''new'', ''open'', ''pending'', ''hold'', ''solved'', ''closed'''
      priority:
        type: string
        description: '''low'', ''normal'', ''high'', ''urgent'''
      assignee_id:
        type: integer
        description: Agent ID to assign to
      group_id:
        type: integer
        description: Group ID to assign to
      subject:
        type: string
        description: Updated subject
      tags:
        type: array
        description: Replace all tags
        items:
          type: string
      comment_body:
        type: string
        description: Add a comment/reply to the ticket
      comment_public:
        type: boolean
        description: 'True for public reply, False for internal note. Default: True'
      custom_fields:
        type: array
        description: List of {id, value} objects
        items:
          type: string
      ticket_id:
        type: integer
        description: Zendesk ticket ID
    required:
    - ticket_id
  note: 'Note: Old spec used transform ''zendesk_ticket_update''. In v2, the LLM constructs the exact body structure directly.'
response:
  success_codes:
  - 200
  - 201
  extract:
    id: ticket_id
tags:
- support
- helpdesk
