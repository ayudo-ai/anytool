# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: zendesk_delete_ticket
app: zendesk
description: Delete a ticket permanently. This cannot be undone.
method: DELETE
path: /api/v2/tickets/{ticket_id}
base_url: https://{subdomain}.zendesk.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
  inject_from_metadata:
    subdomain: subdomain
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      ticket_id:
        type: integer
        description: Zendesk ticket ID to delete
    required:
    - ticket_id
response:
  success_codes:
  - 200
tags:
- support
- helpdesk
