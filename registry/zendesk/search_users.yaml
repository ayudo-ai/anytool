# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: zendesk_search_users
app: zendesk
description: Search users by name, email, or other attributes.
method: GET
path: /api/v2/users/search
base_url: https://{subdomain}.zendesk.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
  inject_from_metadata:
    subdomain: subdomain
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      query:
        type: string
        description: Search query (searches name and email)
      per_page:
        type: integer
        description: Results per page (max 100)
      page:
        type: integer
        description: Page number
    required:
    - query
response:
  success_codes:
  - 200
tags:
- support
- helpdesk
