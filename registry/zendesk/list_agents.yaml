# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: zendesk_list_agents
app: zendesk
description: List all agents in the Zendesk account. Useful for finding agent IDs for assignment.
method: GET
path: /api/v2/users
base_url: https://{subdomain}.zendesk.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
  inject_from_metadata:
    subdomain: subdomain
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      role:
        type: string
        description: 'Filter by role: ''agent'', ''admin''. Default: returns all users'
      per_page:
        type: integer
        description: Results per page (max 100)
      page:
        type: integer
        description: Page number
response:
  success_codes:
  - 200
tags:
- support
- helpdesk
