# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: zendesk_search_tickets
app: zendesk
description: 'Search tickets using Zendesk search syntax. Examples: ''type:ticket status:open priority:high'', ''type:ticket
  requester:user@example.com'', ''type:ticket tags:billing created>2024-01-01''.'
method: GET
path: /api/v2/search
base_url: https://{subdomain}.zendesk.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
  inject_from_metadata:
    subdomain: subdomain
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      query:
        type: string
        description: Zendesk search query (e.g. 'type:ticket status:open priority:urgent')
      sort_by:
        type: string
        description: 'Sort by: ''created_at'', ''updated_at'', ''priority'', ''status'', ''relevance'''
      sort_order:
        type: string
        description: '''asc'' or ''desc'''
      per_page:
        type: integer
        description: Results per page (max 100)
      page:
        type: integer
        description: Page number
    required:
    - query
response:
  success_codes:
  - 200
tags:
- support
- helpdesk
