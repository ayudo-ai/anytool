# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: zendesk_add_comment
app: zendesk
description: Add a comment to a ticket. Set public=true for a customer-visible reply, public=false for an internal note.
method: PUT
path: /api/v2/tickets/{ticket_id}
base_url: https://{subdomain}.zendesk.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
  inject_from_metadata:
    subdomain: subdomain
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      body:
        type: string
        description: Comment body (HTML supported)
      public:
        type: boolean
        description: 'True for public reply, False for internal note. Default: True'
      author_id:
        type: integer
        description: Author user ID (defaults to authenticated user)
      ticket_id:
        type: integer
        description: Zendesk ticket ID
    required:
    - body
    - ticket_id
  note: 'Note: Old spec used transform ''zendesk_comment''. In v2, the LLM constructs the exact body structure directly.'
response:
  success_codes:
  - 200
  - 201
  extract:
    id: ticket_id
tags:
- support
- helpdesk
