# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: hubspot_search_companies
app: hubspot
description: Search companies using filters or full-text query.
method: POST
path: /crm/v3/objects/companies/search
base_url: https://api.hubapi.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      query:
        type: string
        description: Full-text search query
      filter_property:
        type: string
        description: Property name to filter by (e.g. 'domain', 'name')
      filter_operator:
        type: string
        description: 'Operator: EQ, NEQ, CONTAINS_TOKEN, etc.'
      filter_value:
        type: string
        description: Value to filter by
      limit:
        type: integer
        description: Max results (default 10, max 100)
      properties:
        type: array
        description: Property names to return
        items:
          type: string
  note: 'Note: Old spec used transform ''hubspot_search''. In v2, the LLM constructs the exact body structure directly.'
response:
  success_codes:
  - 200
  - 201
tags:
- crm
- sales
