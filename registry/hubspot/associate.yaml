name: hubspot_associate
app: hubspot
description: 'Create an association between two HubSpot objects. For example, link a contact to a company or a deal to a contact.
  from_type and to_type: ''contacts'', ''companies'', ''deals''.'
method: PUT
path: /crm/v3/objects/{from_type}/{from_id}/associations/{to_type}/{to_id}/{association_type}
base_url: https://api.hubapi.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      from_type:
        type: string
        description: 'Source object type: ''contacts'', ''companies'', ''deals'''
      from_id:
        type: string
        description: Source object ID
      to_type:
        type: string
        description: 'Target object type: ''contacts'', ''companies'', ''deals'''
      to_id:
        type: string
        description: Target object ID
      association_type:
        type: string
        description: Association type (e.g. 'contact_to_company', 'deal_to_contact')
    required:
    - from_type
    - from_id
    - to_type
    - to_id
    - association_type
response:
  success_codes:
  - 200
  - 201
tags:
- crm
- sales
