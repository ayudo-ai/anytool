# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: hubspot_create_company
app: hubspot
description: Create a new company in HubSpot.
method: POST
path: /crm/v3/objects/companies
base_url: https://api.hubapi.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      name:
        type: string
        description: Company name
      domain:
        type: string
        description: Company website domain (e.g. 'acme.com')
      industry:
        type: string
        description: Industry
      phone:
        type: string
        description: Company phone
      city:
        type: string
        description: City
      state:
        type: string
        description: State/region
      country:
        type: string
        description: Country
    required:
    - name
  note: 'Note: Old spec used transform ''hubspot_properties''. In v2, the LLM constructs the exact body structure directly.'
response:
  success_codes:
  - 200
  - 201
  extract:
    id: company_id
tags:
- crm
- sales
