# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: hubspot_get_contact
app: hubspot
description: Get a contact by ID. Returns all default properties. Specify extra properties to fetch with the properties param.
method: GET
path: /crm/v3/objects/contacts/{contact_id}
base_url: https://api.hubapi.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      properties:
        type: string
        description: Comma-separated property names to include
      contact_id:
        type: string
        description: HubSpot contact ID
    required:
    - contact_id
response:
  success_codes:
  - 200
  extract:
    id: contact_id
tags:
- crm
- sales
