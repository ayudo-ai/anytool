# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: hubspot_search_contacts
app: hubspot
description: Search contacts using filters. Supports filtering by any property. Returns up to 100 results.
method: POST
path: /crm/v3/objects/contacts/search
base_url: https://api.hubapi.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      query:
        type: string
        description: Full-text search query (searches across all text properties)
      filter_property:
        type: string
        description: Property name to filter by (e.g. 'email', 'company')
      filter_operator:
        type: string
        description: 'Operator: EQ, NEQ, LT, LTE, GT, GTE, CONTAINS_TOKEN, NOT_CONTAINS_TOKEN'
      filter_value:
        type: string
        description: Value to filter by
      limit:
        type: integer
        description: Max results (default 10, max 100)
      properties:
        type: array
        description: List of property names to return
        items:
          type: string
  note: 'Note: Old spec used transform ''hubspot_search''. In v2, the LLM constructs the exact body structure directly.'
response:
  success_codes:
  - 200
  - 201
tags:
- crm
- sales
