# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: hubspot_update_deal
app: hubspot
description: Update a deal's properties (stage, amount, owner, etc.).
method: PATCH
path: /crm/v3/objects/deals/{deal_id}
base_url: https://api.hubapi.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      dealname:
        type: string
        description: Deal name
      amount:
        type: string
        description: Deal amount
      dealstage:
        type: string
        description: Pipeline stage ID
      closedate:
        type: string
        description: Expected close date
      hubspot_owner_id:
        type: string
        description: Owner ID
      deal_id:
        type: string
        description: HubSpot deal ID
    required:
    - deal_id
  note: 'Note: Old spec used transform ''hubspot_properties''. In v2, the LLM constructs the exact body structure directly.'
response:
  success_codes:
  - 200
  extract:
    id: deal_id
tags:
- crm
- sales
