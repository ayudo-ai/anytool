# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: hubspot_create_note
app: hubspot
description: Create a note and associate it with a contact, company, or deal. Use associations param to link to objects.
method: POST
path: /crm/v3/objects/notes
base_url: https://api.hubapi.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      body:
        type: string
        description: Note body text (HTML supported)
      contact_id:
        type: string
        description: Contact ID to associate the note with
      company_id:
        type: string
        description: Company ID to associate the note with
      deal_id:
        type: string
        description: Deal ID to associate the note with
      hubspot_owner_id:
        type: string
        description: Owner ID for the note
    required:
    - body
  note: 'Note: Old spec used transform ''hubspot_note''. In v2, the LLM constructs the exact body structure directly.'
response:
  success_codes:
  - 200
  - 201
  extract:
    id: note_id
tags:
- crm
- sales
