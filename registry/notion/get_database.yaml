name: notion_get_database
app: notion
version: "1"
description: "Retrieve a database schema and metadata"
method: GET
path: /v1/databases/{database_id}
base_url: https://api.notion.com
auth:
  type: bearer
  header: "Authorization: Bearer {access_token}"
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      database_id:
        type: string
        description: The database_id to use.
response:
  success_codes: [200]
tags: [notion, productivity]
examples:
  - name: "Basic get database"
    request: {}
    response:
      status: success
