  \ using [ Get edit issue metadata](#api-rest-api-3-issue-issueIdOrKey-editmeta-get).\n\nThe parent field may be set by key\
  \ or ID. For standard issue types, the parent may be removed by setting `update.parent.set.none` to *true*. Note that the\
  \ `description`, `environment`, and any `textarea` type custom fields (multi-line text fields) take Atlassian Document Format\
  \ content. Single line custom fields (`textfield`) accept a string and don't handle Atlassian Document Format content.\n\
  \nConnect apps having an app user with *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg),\
  \ and Forge apps acting on behalf of users with *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg),\
  \ can override the screen security configuration using `overrideScreenSecurity` and `overrideEditableFlag`.\n\nThis operation\
  \ can be accessed anonymously.\n\n**[Permissions](#permissions) required:**\n\n *  *Browse projects* and *Edit issues* [project\
  \ permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.\n *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg)\
  \ is configured, issue-level security permission to view the issue."
