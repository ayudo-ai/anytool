# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: docusign_get_envelope
app: docusign
description: Get the status and details of a DocuSign envelope. Returns status (sent, delivered, completed, voided, declined),
  recipient info, and timestamps.
method: GET
path: /restapi/v2.1/accounts/{account_id}/envelopes/{envelope_id}
base_url: https://demo.docusign.net
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
  inject_from_metadata:
    account_id: account_id
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      envelope_id:
        type: string
        description: Envelope ID to check
    required:
    - envelope_id
response:
  success_codes:
  - 200
  extract:
    envelopeId: envelope_id
tags:
- esignature
- documents
