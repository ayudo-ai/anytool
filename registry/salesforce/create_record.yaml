name: salesforce_create_record
app: salesforce
version: "1"
description: "Create a new record (Lead, Contact, Account, etc.)"
method: POST
path: /sobjects/{sObjectType}
base_url: https://{domain}.my.salesforce.com/services/data/v59.0
auth:
  type: bearer
  header: "Authorization: Bearer {access_token}"
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      sObjectType:
        type: string
        description: The sObjectType.
response:
  success_codes: [200]
tags: [salesforce]
examples:
  - name: "Basic create record"
    request: {}
    response:
      status: success
