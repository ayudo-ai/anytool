# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: whatsapp_mark_read
app: whatsapp
description: Mark a message as read (sends blue check marks to the sender).
method: POST
path: /{phone_number_id}/messages
base_url: https://graph.facebook.com/v21.0
auth:
  type: bearer
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      message_id:
        type: string
        description: ID of the message to mark as read
      phone_number_id:
        type: string
        description: Your WhatsApp Business phone number ID
    required:
    - message_id
    - phone_number_id
  note: 'Note: Old spec used transform ''whatsapp_read''. In v2, the LLM constructs the exact body structure directly.'
response:
  success_codes:
  - 200
  - 201
tags:
- messaging
- mobile
