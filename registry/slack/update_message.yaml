# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: slack_update_message
app: slack
description: Update an existing Slack message.
method: POST
path: /chat.update
base_url: https://slack.com/api
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      channel:
        type: string
        description: Channel ID containing the message
      ts:
        type: string
        description: Timestamp of the message to update
      text:
        type: string
        description: New message text
    required:
    - channel
    - ts
    - text
response:
  success_codes:
  - 200
  - 201
  extract:
    ts: message_ts
tags:
- messaging
- chat
