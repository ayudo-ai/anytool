# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: slack_add_reaction
app: slack
description: Add an emoji reaction to a message. Use emoji name without colons (e.g. 'thumbsup' not ':thumbsup:').
method: POST
path: /reactions.add
base_url: https://slack.com/api
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      channel:
        type: string
        description: Channel ID containing the message
      timestamp:
        type: string
        description: Timestamp of the message to react to
      name:
        type: string
        description: Emoji name without colons (e.g. 'thumbsup', 'white_check_mark')
    required:
    - channel
    - timestamp
    - name
response:
  success_codes:
  - 200
  - 201
tags:
- messaging
- chat
