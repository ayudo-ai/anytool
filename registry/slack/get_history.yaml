# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: slack_get_history
app: slack
description: Get recent messages from a channel. Returns messages in reverse chronological order.
method: GET
path: /conversations.history
base_url: https://slack.com/api
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      channel:
        type: string
        description: Channel ID
      limit:
        type: integer
        description: Number of messages to return (default 20, max 1000)
      oldest:
        type: string
        description: Only messages after this timestamp
      latest:
        type: string
        description: Only messages before this timestamp
      cursor:
        type: string
        description: Pagination cursor
    required:
    - channel
response:
  success_codes:
  - 200
tags:
- messaging
- chat
