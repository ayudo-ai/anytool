# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: freshdesk_create_ticket
app: freshdesk
description: 'Create a new support ticket. Requires either email or requester_id. Set status: 2=Open, 3=Pending, 4=Resolved,
  5=Closed. Set priority: 1=Low, 2=Medium, 3=High, 4=Urgent.'
method: POST
path: /api/v2/tickets
base_url: https://{domain}
auth:
  type: api_key
  header: 'Authorization: Basic {base64(api_key:X)}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      subject:
        type: string
        description: Ticket subject line
      description:
        type: string
        description: Ticket description (HTML supported)
      email:
        type: string
        description: Requester's email address
      requester_id:
        type: integer
        description: Requester's Freshdesk user ID (alternative to email)
      status:
        type: integer
        description: '2=Open, 3=Pending, 4=Resolved, 5=Closed. Default: 2'
      priority:
        type: integer
        description: '1=Low, 2=Medium, 3=High, 4=Urgent. Default: 1'
      type:
        type: string
        description: Ticket type (e.g. 'Question', 'Incident', 'Problem')
      group_id:
        type: integer
        description: Group to assign ticket to
      responder_id:
        type: integer
        description: Agent to assign ticket to
      tags:
        type: array
        description: List of tags, e.g. ['billing', 'urgent']
        items:
          type: string
      cc_emails:
        type: array
        description: CC email addresses
        items:
          type: string
    required:
    - subject
    - description
response:
  success_codes:
  - 200
  - 201
  extract:
    id: ticket_id
tags:
- support
- helpdesk
