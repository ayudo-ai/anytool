          end fields. This field is omitted for single events or instances of recurring events.
      reminders:
        type: object
        properties:
          overrides:
            type: array
            items:
              type: object
              properties:
                method:
                  type: string
                  description: "The method used by this reminder. Possible values are:  \n- \"email\" - Reminders are sent\
                    \ via email. \n- \"popup\" - Reminders are sent via a UI popup.  \nRequired when adding a reminder."
                minutes:
                  type: integer
                  format: int32
                  description: 'Number of minutes before the start of the event when the reminder should trigger. Valid values
                    are between 0 and 40320 (4 weeks in minutes).

                    Required when adding a reminder.'
            description: If the event doesn't use the default reminders, this lists the reminders specific to the event, or,
