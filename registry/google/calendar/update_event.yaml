              description: Number of additional guests. Optional. The default is 0.
              default: '0'
            asyncOperation:
              type: string
              description: "If present, indicates the status of an asynchronous operation ongoing for this attendee (e.g.\
                \ listing of members of large attendee groups). Read-only. The default is to not be present.\nPossible values\
                \ are:  \n- \"inProgress\" - The asynchronous operation is in progress. \n- (not present) - Otherwise."
              default: ''
            comment:
              type: string
              description: The attendee's response comment. Optional.
            displayName:
              type: string
              description: The attendee's name, if available. Optional.
            email:
              type: string
              description: 'The attendee''s email address, if available. This field must be present when adding an attendee.
                It must be a valid email address as per RFC5322.

                Required when adding an attendee.'
            id:
              type: string
              description: The attendee's Profile ID, if available.
            optional:
              type: boolean
              description: Whether this is an optional attendee. Optional. The default is False.
              default: 'false'
            organizer:
              type: boolean
              description: Whether the attendee is the organizer of the event. Read-only. The default is False.
            resource:
              type: boolean
              description: Whether the attendee is a resource. Can only be set when the attendee is added to the event for
                the first time. Subsequent modifications are ignored. Optional. The default is False.
              default: 'false'
            responseStatus:
              type: string
              description: "The attendee's response status. Possible values are:  \n- \"needsAction\" - The attendee has not\
                \ responded to the invitation (recommended for new events). \n- \"declined\" - The attendee has declined the\
                \ invitation. \n- \"tentative\" - The attendee has tentatively accepted the invitation. \n- \"accepted\" -\
                \ The attendee has accepted the invitation.  Warning: If you add an event using the values declined, tentative,\
