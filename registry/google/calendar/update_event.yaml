    conferenceDataVersion:
      type: integer
      description: Version number of conference data supported by the API client. Version 0 assumes no conference data support
        and ignores conference data in the event's body. Version 1 enables support for copying of ConferenceData as well as
        for creating new conferences using the createRequest field of conferenceData. The default is 0.
    maxAttendees:
      type: integer
      description: The maximum number of attendees to include in the response. If there are more than the specified number
        of attendees, only the participant is returned. Optional.
    sendNotifications:
      type: boolean
      description: 'Deprecated. Please use sendUpdates instead.


        Whether to send notifications about the event update (for example, description changes, etc.). Note that some emails
        might still be sent even if you set the value to false. The default is false.'
    sendUpdates:
      type: string
      description: Guests who should receive notifications about the event update (for example, title changes, etc.).
      enum:
