      location:
        type: string
        description: Geographic location of the event as free-form text. Optional.
      recurrence:
        type: array
        items:
          type: string
        description: List of RRULE, EXRULE, RDATE and EXDATE lines for a recurring event, as specified in RFC5545. Note that
