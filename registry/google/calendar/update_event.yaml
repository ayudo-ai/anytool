                \ in email\" or \"Only if the sender is known\" might have their response reset to needsAction and won't see\
                \ an event in their calendar unless they change their response in the event invitation email. Furthermore,\
                \ if more than 200 guests are invited to the event, response status is not propagated to the guests."
            self:
              type: boolean
              description: Whether this entry represents the calendar on which this copy of the event appears. Read-only.
                The default is False.
              default: 'false'
        description: The attendees of the event. See the Events with attendees guide for more information on scheduling events
          with other calendar users. Service accounts need to use domain-wide delegation of authority to populate the attendee
          list.
      description:
        type: string
        description: Description of the event. Can contain HTML. Optional.
      end:
        type: object
        properties:
          date:
            type: string
            description: The date, in the format "yyyy-mm-dd", if this is an all-day event.
          dateTime:
            type: string
            format: date-time
            description: The time, as a combined date-time value (formatted according to RFC3339). A time zone offset is required
