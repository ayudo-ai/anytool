          \ and the original organizer is not on the attendee list, it will leave behind a cancelled event where only the\
          \ id field is guaranteed to be populated."
      summary:
        type: string
        description: Title of the event.
      calendarId:
        type: string
        description: Calendar identifier. To retrieve calendar IDs call the calendarList.list method. If you want to access
          the primary calendar of the currently logged in user, use the "primary" keyword.
        required: true
      eventId:
        type: string
        description: Event identifier.
        required: true
