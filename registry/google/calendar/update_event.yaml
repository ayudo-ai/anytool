      status:
        type: string
        description: "Status of the event. Optional. Possible values are:  \n- \"confirmed\" - The event is confirmed. This\
          \ is the default status. \n- \"tentative\" - The event is tentatively confirmed. \n- \"cancelled\" - The event is\
          \ cancelled (deleted). The list method returns cancelled events only on incremental sync (when syncToken or updatedMin\
          \ are specified) or if the showDeleted flag is set to true. The get method always returns them.\nA cancelled status\
          \ represents two different states depending on the event type:  \n- Cancelled exceptions of an uncancelled recurring\
          \ event indicate that this instance should no longer be presented to the user. Clients should store these events\
          \ for the lifetime of the parent recurring event.\nCancelled exceptions are only guaranteed to have values for the\
          \ id, recurringEventId and originalStartTime fields populated. The other fields might be empty.  \n- All other cancelled\
          \ events represent deleted events. Clients should remove their locally synced copies. Such cancelled events will\
          \ eventually disappear, so do not rely on them being available indefinitely.\nDeleted events are only guaranteed\
          \ to have the id field populated.   On the organizer's calendar, cancelled events continue to expose event details\
