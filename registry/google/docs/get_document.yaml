name: docs_get_document
app: google
version: '1'
description: Gets the latest version of the specified document.
method: GET
path: /v1/documents/{documentId}
base_url: https://docs.googleapis.com
auth:
  type: oauth2
  scopes:
  - https://www.googleapis.com/auth/documents
  header: 'Authorization: Bearer {access_token}'
request:
  query_params:
    suggestionsViewMode:
      type: string
      description: The suggestions view mode to apply to the document. This allows viewing the document with all suggestions
        inline, accepted or rejected. If one is not specified, DEFAULT_FOR_CURRENT_ACCESS is used.
      enum:
      - DEFAULT_FOR_CURRENT_ACCESS
      - SUGGESTIONS_INLINE
      - PREVIEW_SUGGESTIONS_ACCEPTED
      - PREVIEW_WITHOUT_SUGGESTIONS
    includeTabsContent:
      type: boolean
      description: 'Whether to populate the Document.tabs field instead of the text content fields like `body` and `documentStyle`
        on Document. - When `True`: Document content populates in the Document.tabs field instead of the text content fields
        in Document. - When `False`: The content of the document''s first tab populates the content fields in Document excluding
        Document.tabs. If a document has only one tab, then that tab is used to populate the document content. Document.tabs
        will be empty.'
  content_type: application/json
  body_schema:
    type: object
    properties:
      documentId:
        type: string
        description: The ID of the document to retrieve.
        required: true
    required:
    - documentId
response:
  success_codes:
  - 200
  body_schema:
    type: object
    properties:
      documentId:
        type: string
        description: Output only. The ID of the document.
      title:
        type: string
        description: The title of the document.
      revisionId:
        type: string
        description: Output only. The revision ID of the document. Can be used in update requests to specify which revision
          of a document to apply updates to and how the request should behave if the document has been edited since that revision.
          Only populated if the user has edit access to the document. The revision ID is not a sequential number but an opaque
          string. The format of the revision ID might change over time. A returned revision ID is only guaranteed to be valid
          for 24 hours after it has been returned and cannot be shared across users. If the revision ID is unchanged between
          calls, then the document has not changed. Conversely, a changed ID (for the same document and user) usually means
          the document has been updated. However, a changed ID can also be due to internal factors such as ID format changes.
      body:
        type: object
        properties: {}
        description: The document body. The body typically contains the full document contents except for headers, footers,
          and footnotes.
    description: A Google Docs document.
tags:
- google
- docs
examples:
- name: Basic docs get document
  request:
    documentId: <documentId>
  response:
    status: success
