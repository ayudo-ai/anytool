# ──────────────────────────────────────────────────────────────────────
# Gmail — New Email Trigger
# Polls Gmail API for new messages in a given label/folder.
# ──────────────────────────────────────────────────────────────────────

trigger: gmail_new_email
app: google
display_name: Gmail New Email
description: |
  Fires when a new email arrives in the specified label.
  Polls the Gmail API at the configured interval.

mode: poll
provider: google

auth:
  type: oauth2
  scopes:
    - https://www.googleapis.com/auth/gmail.modify
    - https://mail.google.com/

config:
  type: object
  properties:
    label:
      type: string
      title: Label / Folder
      description: Gmail label to watch (e.g. INBOX, UNREAD, STARRED).
      default: INBOX
    interval:
      type: integer
      title: Poll Interval (seconds)
      description: How often to check for new emails. Minimum 30 seconds.
      default: 90
      minimum: 30

poll:
  endpoint: https://gmail.googleapis.com/gmail/v1/users/me/messages
  params:
    labelIds: "{config.label}"
    maxResults: 10
    q: "is:unread"
  id_field: id
  detail_endpoint: https://gmail.googleapis.com/gmail/v1/users/me/messages/{id}
  detail_params:
    format: full

payload:
  type: object
  properties:
    message_id:
      type: string
      description: Gmail message ID
    thread_id:
      type: string
      description: Thread ID for conversation grouping
    from:
      type: string
      description: Sender email address
    to:
      type: string
      description: Recipient email address(es)
    subject:
      type: string
      description: Email subject line
    body:
      type: string
      description: Email body (plain text)
    date:
      type: string
      description: Email date (RFC 2822)
    has_attachments:
      type: boolean
      description: Whether the email has attachments
    labels:
      type: array
      items:
        type: string
      description: Gmail labels on this message

tags: [email, communication, google]

examples:
  - name: New customer inquiry
    payload:
      message_id: "18f4a5b2c3d4e5f6"
      thread_id: "18f4a5b2c3d4e5f6"
      from: "customer@example.com"
      to: "support@yourcompany.com"
      subject: "Pricing question"
      body: "Hi, I'd like to know about your enterprise pricing..."
      date: "Thu, 22 May 2026 10:30:00 -0700"
      has_attachments: false
      labels: ["INBOX", "UNREAD"]
