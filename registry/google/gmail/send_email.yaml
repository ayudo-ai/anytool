# ──────────────────────────────────────────────────────────────────────
# Gmail — Send Email
# Tier 3: Requires MIME encoding. This is one of the ~5 actions
#          that needs an encoder function.
#
# Gmail's API doesn't accept {to, subject, body} as JSON.
# It requires an RFC 2822 MIME message, base64url-encoded, in a 'raw' field.
#
# This spec has TWO sections:
# 1. agent_params: what the LLM sees and constructs (friendly params)
# 2. request.body_schema: what actually goes to the API (raw MIME)
#
# The encoder bridges them: agent_params → MIME → base64 → {raw: "..."}
# ──────────────────────────────────────────────────────────────────────

name: gmail_send_email
app: google
version: "1"
description: |
  Send an email via Gmail.
  Supports plain text and HTML body, CC/BCC, reply-in-thread,
  and custom headers like Reply-To.

method: POST
path: /gmail/v1/users/me/messages/send
base_url: https://gmail.googleapis.com

auth:
  type: oauth2
  scopes:
    - https://www.googleapis.com/auth/gmail.send
  header: "Authorization: Bearer {access_token}"

# ── What the LLM constructs ──────────────────────────────────────────
# The encoder transforms these into the actual API request body.

encoder: gmail_mime

agent_params:
  type: object
  required: [to, subject, body]
  properties:
    to:
      type: string
      description: |
        Recipient email address(es).
        For multiple recipients, comma-separate: "alice@example.com, bob@example.com"
    subject:
      type: string
      description: Email subject line.
    body:
      type: string
      description: |
        Email body. Plain text by default.
        For HTML emails, set content_type to 'text/html'.
    cc:
      type: string
      description: CC recipients (comma-separated email addresses).
    bcc:
      type: string
      description: BCC recipients (comma-separated email addresses).
    reply_to:
      type: string
      description: Reply-To email address (if different from sender).
    content_type:
      type: string
      description: Body content type.
      enum: [text/plain, text/html]
      default: text/plain
    thread_id:
      type: string
      description: |
        Gmail thread ID to reply in. When replying to a thread, also set
        the subject to "Re: <original subject>" and include the
        In-Reply-To and References headers from the original message.
    in_reply_to:
      type: string
      description: |
        Message-ID of the email being replied to.
        Required for proper threading with external email clients.
    references:
      type: string
      description: |
        Space-separated list of Message-IDs in the thread.
        Required for proper threading.

# ── What actually goes to the Gmail API ───────────────────────────────
# After the encoder runs, the request body looks like this.

request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      raw:
        type: string
        description: |
          The entire email as an RFC 2822 message, base64url-encoded.
          Generated by the gmail_mime encoder from agent_params.
      threadId:
        type: string
        description: Thread ID for replies.
  note: |
    IMPORTANT: The LLM does NOT construct this body directly.
    The LLM fills in agent_params (to, subject, body, etc.)
    and the gmail_mime encoder builds the raw MIME message.

# ── Encoder specification ────────────────────────────────────────────
# This documents what the encoder does so it can be implemented/verified.

encoder_spec:
  name: gmail_mime
  input: agent_params
  output: request.body_schema
  logic: |
    1. Build RFC 2822 MIME message:
       - Set From (from authenticated user's email)
       - Set To, CC, BCC from params
       - Set Subject
       - Set Content-Type based on content_type param
       - Set In-Reply-To and References if replying
       - Set body as the message payload
    2. Base64url-encode the entire MIME message (no padding)
    3. Return: {raw: "<base64url>", threadId: "<thread_id if set>"}

response:
  success_codes: [200]
  body_schema:
    type: object
    properties:
      id:
        type: string
        description: The immutable Gmail message ID.
      threadId:
        type: string
        description: Thread ID the message belongs to.
      labelIds:
        type: array
        items:
          type: string
        description: Labels applied to the sent message (typically ["SENT"]).
  extract:
    message_id: id
    thread_id: threadId

errors:
  invalid_grant: "OAuth token is invalid or expired. User must re-authorize."
  recipient_error: "One or more recipient email addresses are invalid."
  daily_limit: "Gmail API daily sending limit reached (varies by account type)."

rate_limit:
  per_user_per_second: 1
  daily_sending_limit: 2000
  note: |
    Gmail has strict per-user rate limits.
    Free accounts: ~500 emails/day.
    Workspace accounts: ~2000 emails/day.

tags: [email, communication, google]

examples:
  - name: Simple email
    description: Send a plain text email.
    agent_input:
      to: "sarah@example.com"
      subject: "Invoice Follow-up"
      body: "Hi Sarah,\n\nPlease send the updated invoice when you get a chance.\n\nThanks,\nNitin"
    actual_request:
      raw: "dG86IHNhcmFoQGV4YW1wbGUuY29tDQpzdWJqZWN0OiBJbnZvaWNlIEZvbGxvdy11cA0KY29udGVudC10eXBlOiB0ZXh0L3BsYWluDQoNCkhpIFNhcmFoLC4uLg=="
    response:
      id: "msg-18f4a5b2c3d4e5f6"
      threadId: "thread-18f4a5b2c3d4e5f6"
      labelIds: ["SENT"]

  - name: HTML email with CC
    agent_input:
      to: "sarah@example.com"
      cc: "manager@example.com"
      subject: "Q2 Report Ready"
      body: "<h2>Q2 Report</h2><p>The quarterly report is attached. Key highlights:</p><ul><li>Revenue up 15%</li><li>New customers: 42</li></ul>"
      content_type: "text/html"
    response:
      id: "msg-28a4b5c6d7e8f901"
      threadId: "thread-28a4b5c6d7e8f901"
      labelIds: ["SENT"]

  - name: Reply in thread
    description: Reply to an existing email thread.
    agent_input:
      to: "sarah@example.com"
      subject: "Re: Invoice Follow-up"
      body: "Thanks Sarah, received it. Looks good!"
      thread_id: "thread-18f4a5b2c3d4e5f6"
      in_reply_to: "<original-message-id@mail.gmail.com>"
      references: "<original-message-id@mail.gmail.com>"
    response:
      id: "msg-38b5c6d7e8f90123"
      threadId: "thread-18f4a5b2c3d4e5f6"
      labelIds: ["SENT"]
