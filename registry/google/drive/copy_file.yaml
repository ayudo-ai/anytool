name: drive_copy_file
app: google
version: '1'
description: Creates a copy of a file and applies any requested updates with patch semantics. For more information, see [Create
  and manage files](https://developers.google.com/workspace/drive/api/guides/create-file).
method: POST
path: /files/{fileId}/copy
