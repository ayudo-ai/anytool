name: drive_share_file
app: google
version: '1'
description: Creates a permission for a file or shared drive. For more information, see [Share files, folders, and drives](https://developers.google.com/workspace/drive/api/guides/manage-sharing).
  **Warning:** Concurrent permissions operations on the same file aren't supported; only the last update is applied.
method: POST
path: /files/{fileId}/permissions
base_url: https://www.googleapis.com
auth:
  type: oauth2
  scopes:
  - https://www.googleapis.com/auth/drive
  header: 'Authorization: Bearer {access_token}'
request:
  query_params:
    emailMessage:
      type: string
      description: A plain text custom message to include in the notification email.
    enforceSingleParent:
      type: boolean
      description: 'Deprecated: See `moveToNewOwnersRoot` for details.'
      default: 'false'
    moveToNewOwnersRoot:
      type: boolean
      description: This parameter only takes effect if the item isn't in a shared drive and the request is attempting to transfer
        the ownership of the item. If set to `true`, the item is moved to the new owner's My Drive root folder and all prior
        parents removed. If set to `false`, parents aren't changed.
      default: 'false'
    sendNotificationEmail:
      type: boolean
      description: Whether to send a notification email when sharing to users or groups. This defaults to `true` for users
        and groups, and is not allowed for other requests. It must not be disabled for ownership transfers.
    supportsAllDrives:
      type: boolean
      description: Whether the requesting application supports both My Drives and shared drives.
      default: 'false'
    supportsTeamDrives:
      type: boolean
      description: 'Deprecated: Use `supportsAllDrives` instead.'
      default: 'false'
    transferOwnership:
      type: boolean
      description: Whether to transfer ownership to the specified user and downgrade the current owner to a writer. This parameter
        is required as an acknowledgement of the side effect. For more information, see [Transfer file ownership](https://developers.google.com/workspace/drive/api/guides/transfer-file).
      default: 'false'
    useDomainAdminAccess:
      type: boolean
      description: 'Issue the request as a domain administrator. If set to `true`, and if the following additional conditions
        are met, the requester is granted access: 1. The file ID parameter refers to a shared drive. 2. The requester is an
        administrator of the domain to which the shared drive belongs. For more information, see [Manage shared drives as
        domain administrators](https://developers.google.com/workspace/drive/api/guides/manage-shareddrives#manage-administrators).'
      default: 'false'
    enforceExpansiveAccess:
      type: boolean
      description: 'Deprecated: All requests use the expansive access rules.'
      default: 'false'
  content_type: application/json
  body_schema:
    type: object
    properties:
      id:
        type: string
        description: Output only. The ID of this permission. This is a unique identifier for the grantee, and is published
          in the [User resource](https://developers.google.com/workspace/drive/api/reference/rest/v3/User) as `permissionId`.
          IDs should be treated as opaque values.
      displayName:
        type: string
        description: 'Output only. The "pretty" name of the value of the permission. The following is a list of examples for
          each type of permission: * `user` - User''s full name, as defined for their Google Account, such as "Dana A." *
          `group` - Name of the Google Group, such as "The Company Administrators." * `domain` - String domain name, such
          as "cymbalgroup.com." * `anyone` - No `displayName` is present.'
      type:
        type: string
        description: 'The type of the grantee. Supported values include: * `user` * `group` * `domain` * `anyone` When creating
          a permission, if `type` is `user` or `group`, you must provide an `emailAddress` for the user or group. If `type`
          is `domain`, you must provide a `domain`. If `type` is `anyone`, no extra information is required.'
      permissionDetails:
        type: array
        items:
          type: object
          properties:
            permissionType:
              type: string
              description: 'Output only. The permission type for this user. Supported values include: * `file` * `member`'
            inheritedFrom:
              type: string
              description: Output only. The ID of the item from which this permission is inherited. This is only populated
                for items in shared drives.
            role:
              type: string
              description: 'Output only. The primary role for this user. Supported values include: * `owner` * `organizer`
                * `fileOrganizer` * `writer` * `commenter` * `reader` For more information, see [Roles and permissions](https://developers.google.com/workspace/drive/api/guides/ref-roles).'
            inherited:
              type: boolean
              description: Output only. Whether this permission is inherited. This field is always populated. This is an output-only
                field.
        description: Output only. Details of whether the permissions on this item are inherited or are directly on this item.
      photoLink:
        type: string
        description: Output only. A link to the user's profile photo, if available.
      emailAddress:
        type: string
        description: Output only. The email address of the user or group to which this permission refers.
      role:
        type: string
        description: 'The role granted by this permission. Supported values include: * `owner` * `organizer` * `fileOrganizer`
          * `writer` * `commenter` * `reader` For more information, see [Roles and permissions](https://developers.google.com/workspace/drive/api/guides/ref-roles).'
      allowFileDiscovery:
        type: boolean
        description: Whether the permission allows the file to be discovered through search. This is only applicable for permissions
          of type `domain` or `anyone`.
      domain:
        type: string
        description: Output only. The domain to which this permission refers.
      expirationTime:
        type: string
        format: date-time
        description: 'The time at which this permission will expire (RFC 3339 date-time). Expiration times have the following
          restrictions: - They can only be set on user and group permissions - The time must be in the future - The time cannot
          be more than a year in the future'
      teamDrivePermissionDetails:
        type: array
        items:
          type: object
          properties:
            teamDrivePermissionType:
              type: string
              description: 'Deprecated: Output only. Use `permissionDetails/permissionType` instead.'
            inheritedFrom:
              type: string
              description: 'Deprecated: Output only. Use `permissionDetails/inheritedFrom` instead.'
            role:
              type: string
              description: 'Deprecated: Output only. Use `permissionDetails/role` instead.'
            inherited:
              type: boolean
              description: 'Deprecated: Output only. Use `permissionDetails/inherited` instead.'
        description: 'Output only. Deprecated: Output only. Use `permissionDetails` instead.'
      deleted:
        type: boolean
        description: Output only. Whether the account associated with this permission has been deleted. This field only pertains
          to permissions of type `user` or `group`.
      view:
        type: string
        description: 'Indicates the view for this permission. Only populated for permissions that belong to a view. The only
          supported values are `published` and `metadata`: * `published`: The permission''s role is `publishedReader`. * `metadata`:
          The item is only visible to the `metadata` view because the item has limited access and the scope has at least read
          access to the parent. The `metadata` view is only supported on folders. For more information, see [Views](https://developers.google.com/workspace/drive/api/guides/ref-roles#views).'
      pendingOwner:
        type: boolean
        description: Whether the account associated with this permission is a pending owner. Only populated for permissions
          of type `user` for files that aren't in a shared drive.
      inheritedPermissionsDisabled:
        type: boolean
        description: When `true`, only organizers, owners, and users with permissions added directly on the item can access
          it.
    description: A permission for a file. A permission grants a user, group, domain, or the world access to a file or a folder
      hierarchy. For more information, see [Share files, folders, and drives](https://developers.google.com/workspace/drive/api/guides/manage-sharing).
      By default, permission requests only return a subset of fields. Permission `kind`, `ID`, `type`, and `role` are always
      returned. To retrieve specific fields, see [Return specific fields](https://developers.google.com/workspace/drive/api/guides/fields-parameter).
      Some resource methods (such as `permissions.update`) require a `permissionId`. Use the `permissions.list` method to
      retrieve the ID for a file, folder, or shared drive.
response:
  success_codes:
