      description: 'Deprecated: Use `supportsAllDrives` instead.'
      default: 'false'
    enforceSingleParent:
      type: boolean
      description: 'Deprecated: If an item isn''t in a shared drive and its last parent is deleted but the item itself isn''t,
        the item will be placed under its owner''s root.'
