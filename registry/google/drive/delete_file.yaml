name: drive_delete_file
app: google
version: '1'
description: Permanently deletes a file owned by the user without moving it to the trash. For more information, see [Trash
  or delete files and folders](https://developers.google.com/workspace/drive/api/guides/delete). If the file belongs to a
  shared drive, the user must be an `organizer` on the parent folder. If the target is a folder, all descendants owned by
  the user are also deleted.
method: DELETE
path: /files/{fileId}
base_url: https://www.googleapis.com/drive/v3
auth:
  type: oauth2
  scopes:
