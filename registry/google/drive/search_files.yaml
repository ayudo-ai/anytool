                  description: Nested object (depth limit reached)
                me:
                  type: object
                  description: Nested object (depth limit reached)
                permissionId:
                  type: object
                  description: Nested object (depth limit reached)
                emailAddress:
                  type: object
                  description: Nested object (depth limit reached)
                photoLink:
                  type: object
                  description: Nested object (depth limit reached)
              description: Information about a Drive user.
            owners:
              type: array
              items:
                type: object
                description: Nested object (depth limit reached)
              description: Output only. The owner of this file. Only certain legacy files may have more than one owner. This
