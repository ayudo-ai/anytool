name: drive_search_files
app: google
version: '1'
description: ' Lists the user''s files. For more information, see [Search for files and folders](https://developers.google.com/workspace/drive/api/guides/search-files).
  This method accepts the `q` parameter, which is a search query combining one or more search terms. This method returns *all*
  files by default, including trashed files. If you don''t want trashed files to appear in the list, use the `trashed=false`
  query parameter to remove trashed files from the results.'
method: GET
path: /files
base_url: https://www.googleapis.com
auth:
  type: oauth2
  scopes:
  - https://www.googleapis.com/auth/drive
  header: 'Authorization: Bearer {access_token}'
request:
  query_params:
    corpora:
      type: string
      description: 'Specifies a collection of items (files or documents) to which the query applies. Supported items include:
        * `user` * `domain` * `drive` * `allDrives` Prefer `user` or `drive` to `allDrives` for efficiency. By default, corpora
        is set to `user`. However, this can change depending on the filter set through the `q` parameter. For more information,
        see [File organization](https://developers.google.com/workspace/drive/api/guides/about-files#file-organization).'
    corpus:
      type: string
      description: 'Deprecated: The source of files to list. Use `corpora` instead.'
      enum:
      - domain
      - user
    driveId:
      type: string
      description: ID of the shared drive to search.
    includeItemsFromAllDrives:
      type: boolean
      description: Whether both My Drive and shared drive items should be included in results.
      default: 'false'
    includeTeamDriveItems:
      type: boolean
      description: 'Deprecated: Use `includeItemsFromAllDrives` instead.'
      default: 'false'
    orderBy:
      type: string
      description: 'A comma-separated list of sort keys. Valid keys are: * `createdTime`: When the file was created. Avoid
        using this key for queries on large item collections as it might result in timeouts or other issues. For time-related
        sorting on large item collections, use `modifiedTime desc` instead. * `folder`: The folder ID. This field is sorted
        using alphabetical ordering. * `modifiedByMeTime`: The last time the file was modified by the user. * `modifiedTime`:
        The last time the file was modified by anyone. * `name`: The name of the file. This field is sorted using alphabetical
        ordering, so 1, 12, 2, 22. * `name_natural`: The name of the file. This field is sorted using natural sort ordering,
        so 1, 2, 12, 22. * `quotaBytesUsed`: The number of storage quota bytes used by the file. * `recency`: The most recent
        timestamp from the file''s date-time fields. * `sharedWithMeTime`: When the file was shared with the user, if applicable.
        * `starred`: Whether the user has starred the file. * `viewedByMeTime`: The last time the file was viewed by the user.
        Each key sorts ascending by default, but can be reversed with the `desc` modifier. Example usage: `?orderBy=folder,modifiedTime
        desc,name`.'
    pageSize:
      type: integer
      description: The maximum number of files to return per page. Pages may be partial or empty even before reaching the
        end of the file list. If unspecified, at most 100 files are returned for shared drives, and the entire list of files
        for non-shared drives. The maximum value is 100; values above 100 are changed to 100.
      default: '100'
    pageToken:
      type: string
      description: The token for continuing a previous list request on the next page. This should be set to the value of `nextPageToken`
        from the previous response.
    q:
      type: string
      description: A query for filtering the file results. For supported syntax, see [Search for files and folders](/workspace/drive/api/guides/search-files).
    spaces:
      type: string
      description: A comma-separated list of spaces to query within the corpora. Supported values are `drive` and `appDataFolder`.
        For more information, see [File organization](https://developers.google.com/workspace/drive/api/guides/about-files#file-organization).
      default: drive
    supportsAllDrives:
      type: boolean
      description: Whether the requesting application supports both My Drives and shared drives.
      default: 'false'
    supportsTeamDrives:
      type: boolean
      description: 'Deprecated: Use `supportsAllDrives` instead.'
      default: 'false'
    teamDriveId:
      type: string
      description: 'Deprecated: Use `driveId` instead.'
    includePermissionsForView:
      type: string
      description: Specifies which additional view's permissions to include in the response. Only `published` is supported.
    includeLabels:
      type: string
      description: A comma-separated list of IDs of labels to include in the `labelInfo` part of the response.
response:
  success_codes:
  - 200
  body_schema:
    type: object
    properties:
      nextPageToken:
        type: string
        description: The page token for the next page of files. This will be absent if the end of the files list has been
          reached. If the token is rejected for any reason, it should be discarded, and pagination should be restarted from
          the first page of results. The page token is typically valid for several hours. However, if new items are added
          or removed, your expected results might differ.
      kind:
        type: string
        description: 'Identifies what kind of resource this is. Value: the fixed string `"drive#fileList"`.'
        default: drive#fileList
      files:
        type: array
        items:
          type: object
          properties:
            kind:
              type: string
              description: 'Output only. Identifies what kind of resource this is. Value: the fixed string `"drive#file"`.'
              default: drive#file
            driveId:
              type: string
              description: Output only. ID of the shared drive the file resides in. Only populated for items in shared drives.
            fileExtension:
              type: string
              description: Output only. The final component of `fullFileExtension`. This is only available for files with
                binary content in Google Drive.
            copyRequiresWriterPermission:
              type: boolean
              description: Whether the options to copy, print, or download this file should be disabled for readers and commenters.
            md5Checksum:
              type: string
              description: Output only. The MD5 checksum for the content of the file. This is only applicable to files with
                binary content in Google Drive.
            contentHints:
              type: object
              properties:
                indexableText:
                  type: string
                  description: Text to be indexed for the file to improve fullText queries. This is limited to 128 KB in length
                    and may contain HTML elements.
                thumbnail:
                  type: object
                  properties:
                    image:
                      type: object
                      description: Nested object (depth limit reached)
                    mimeType:
                      type: object
                      description: Nested object (depth limit reached)
                  description: A thumbnail for the file. This will only be used if Google Drive cannot generate a standard
                    thumbnail.
              description: Additional information about the content of the file. These fields are never populated in responses.
            writersCanShare:
              type: boolean
              description: Whether users with only `writer` permission can modify the file's permissions. Not populated for
                items in shared drives.
            viewedByMe:
              type: boolean
              description: Output only. Whether the file has been viewed by this user.
            mimeType:
              type: string
              description: The MIME type of the file. Google Drive attempts to automatically detect an appropriate value from
                uploaded content, if no value is provided. The value cannot be changed unless a new revision is uploaded.
                If a file is created with a Google Doc MIME type, the uploaded content is imported, if possible. The supported
                import formats are published in the [`about`](/workspace/drive/api/reference/rest/v3/about) resource.
            exportLinks:
              type: object
              additionalProperties:
                type: string
              description: Output only. Links for exporting Docs Editors files to specific formats.
            parents:
              type: array
              items:
                type: string
              description: The ID of the parent folder containing the file. A file can only have one parent folder; specifying
                multiple parents isn't supported. If not specified as part of a create request, the file is placed directly
                in the user's My Drive folder. If not specified as part of a copy request, the file inherits any discoverable
                parent of the source file. Update requests must use the `addParents` and `removeParents` parameters to modify
                the parents list.
            thumbnailLink:
              type: string
              description: Output only. A short-lived link to the file's thumbnail, if available. Typically lasts on the order
                of hours. Not intended for direct usage on web applications due to [Cross-Origin Resource Sharing (CORS)](https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS)
