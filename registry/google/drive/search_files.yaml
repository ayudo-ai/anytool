                  description: The ID of the file that this shortcut points to. Can only be set on `files.create` requests.
                targetMimeType:
                  type: string
                  description: Output only. The MIME type of the file that this shortcut points to. The value of this field
                    is a snapshot of the target's MIME type, captured when the shortcut is created.
                targetResourceKey:
                  type: string
                  description: Output only. The `resourceKey` for the target file.
              description: Information about a shortcut file.
            contentRestrictions:
              type: array
              items:
                type: object
                description: Nested object (depth limit reached)
              description: Restrictions for accessing the content of the file. Only populated if such a restriction exists.
            resourceKey:
              type: string
              description: Output only. A key needed to access the item via a shared link.
            linkShareMetadata:
              type: object
              properties:
                securityUpdateEligible:
                  type: boolean
                  description: Output only. Whether the file is eligible for security update.
                securityUpdateEnabled:
                  type: boolean
                  description: Output only. Whether the security update is enabled for this file.
              description: Contains details about the link URLs that clients are using to refer to this item.
            labelInfo:
              type: object
              properties:
                labels:
                  type: array
                  items:
                    type: object
                    description: Nested object (depth limit reached)
                  description: Output only. The set of labels on the file as requested by the label IDs in the `includeLabels`
                    parameter. By default, no labels are returned.
              description: Label information on the file.
            sha1Checksum:
              type: string
              description: Output only. The SHA1 checksum associated with this file, if available. This field is only populated
                for files with content stored in Google Drive; it's not populated for Docs Editors or shortcut files.
            sha256Checksum:
              type: string
              description: Output only. The SHA256 checksum associated with this file, if available. This field is only populated
                for files with content stored in Google Drive; it's not populated for Docs Editors or shortcut files.
            inheritedPermissionsDisabled:
              type: boolean
              description: Whether this file has inherited permissions disabled. Inherited permissions are enabled by default.
            downloadRestrictions:
              type: object
              properties:
                itemDownloadRestriction:
                  type: object
                  description: Nested object (depth limit reached)
                effectiveDownloadRestrictionWithContext:
                  type: object
                  description: Nested object (depth limit reached)
              description: Download restrictions applied to the file.
            clientEncryptionDetails:
              type: object
              properties:
                encryptionState:
                  type: object
                  description: Nested object (depth limit reached)
                decryptionMetadata:
                  type: object
                  description: Nested object (depth limit reached)
              description: Details about the client-side encryption applied to the file.
          description: The metadata for a file. Some resource methods (such as `files.update`) require a `fileId`. Use the
            `files.list` method to retrieve the ID for a file.
        description: The list of files. If `nextPageToken` is populated, then this list may be incomplete and an additional
          page of results should be fetched.
    description: A list of files.
