            headRevisionId:
              type: string
              description: Output only. The ID of the file's head revision. This is currently only available for files with
                binary content in Google Drive.
            sharingUser:
              type: object
              properties:
                displayName:
                  type: object
                  description: Nested object (depth limit reached)
                kind:
                  type: object
                  description: Nested object (depth limit reached)
                me:
                  type: object
                  description: Nested object (depth limit reached)
                permissionId:
                  type: object
                  description: Nested object (depth limit reached)
                emailAddress:
                  type: object
                  description: Nested object (depth limit reached)
                photoLink:
                  type: object
                  description: Nested object (depth limit reached)
              description: Information about a Drive user.
            webViewLink:
              type: string
              description: Output only. A link for opening the file in a relevant Google editor or viewer in a browser.
            webContentLink:
