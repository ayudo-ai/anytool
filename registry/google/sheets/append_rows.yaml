name: sheets_append_rows
app: google
version: '1'
description: Appends values to a spreadsheet. The input range is used to search for existing data and find a "table" within
  that range. Values will be appended to the next row of the table, starting with the first column of the table. See the [guide](https://developers.google.com/workspace/sheets/api/guides/values#appending_values)
  and [sample code](https://developers.google.com/workspace/sheets/api/samples/writing#append_values) for specific details
  of how tables are detected and data is appended. The caller must specify the spreadsheet ID, range, and a valueInputOption.
  The `valueInputOption` only controls how the input data will be added to the sheet (column-wise or row-wise), it does not
  influence what cell the data starts being written to.
method: POST
path: /v4/spreadsheets/{spreadsheetId}/values/{range}:append
base_url: https://sheets.googleapis.com
auth:
  type: oauth2
  scopes:
  - https://www.googleapis.com/auth/spreadsheets
  header: 'Authorization: Bearer {access_token}'
request:
  query_params:
    valueInputOption:
      type: string
      description: How the input data should be interpreted.
      enum:
      - INPUT_VALUE_OPTION_UNSPECIFIED
      - RAW
      - USER_ENTERED
    insertDataOption:
      type: string
      description: How the input data should be inserted.
      enum:
      - OVERWRITE
      - INSERT_ROWS
    includeValuesInResponse:
      type: boolean
      description: Determines if the update response should include the values of the cells that were appended. By default,
        responses do not include the updated values.
    responseValueRenderOption:
      type: string
      description: Determines how values in the response should be rendered. The default render option is FORMATTED_VALUE.
      enum:
      - FORMATTED_VALUE
      - UNFORMATTED_VALUE
      - FORMULA
    responseDateTimeRenderOption:
      type: string
      description: Determines how dates, times, and durations in the response should be rendered. This is ignored if response_value_render_option
        is FORMATTED_VALUE. The default dateTime render option is SERIAL_NUMBER.
      enum:
      - SERIAL_NUMBER
      - FORMATTED_STRING
  content_type: application/json
  body_schema:
    type: object
    properties:
      range:
        type: string
        description: The [A1 notation](https://developers.google.com/workspace/sheets/api/guides/concepts#cell) of a range
          to search for a logical table of data. Values are appended after the last row of the table.
        required: true
      majorDimension:
        type: string
        enum:
        - DIMENSION_UNSPECIFIED
        - ROWS
        - COLUMNS
        description: 'The major dimension of the values. For output, if the spreadsheet data is: `A1=1,B1=2,A2=3,B2=4`, then
          requesting `range=A1:B2,majorDimension=ROWS` will return `[[1,2],[3,4]]`, whereas requesting `range=A1:B2,majorDimension=COLUMNS`
          will return `[[1,3],[2,4]]`. For input, with `range=A1:B2,majorDimension=ROWS` then `[[1,2],[3,4]]` will set `A1=1,B1=2,A2=3,B2=4`.
          With `range=A1:B2,majorDimension=COLUMNS` then `[[1,2],[3,4]]` will set `A1=1,B1=3,A2=2,B2=4`. When writing, if
          this field is not set, it defaults to ROWS.'
      values:
        type: array
        items:
          type: array
          items: {}
        description: 'The data that was read or to be written. This is an array of arrays, the outer array representing all
          the data and each inner array representing a major dimension. Each item in the inner array corresponds with one
          cell. For output, empty trailing rows and columns will not be included. For input, supported value types are: bool,
          string, and double. Null values will be skipped. To set a cell to an empty value, set the string value to an empty
          string.'
      spreadsheetId:
        type: string
        description: The ID of the spreadsheet to update.
        required: true
    description: Data within a range of the spreadsheet.
    required:
    - spreadsheetId
    - range
response:
  success_codes:
  - 200
  body_schema:
    type: object
    properties:
