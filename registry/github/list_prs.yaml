# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: github_list_prs
app: github
description: List pull requests for a repository.
method: GET
path: /repos/{owner}/{repo}/pulls
base_url: https://api.github.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      state:
        type: string
        description: '''open'', ''closed'', or ''all''. Default: ''open'''
      sort:
        type: string
        description: '''created'', ''updated'', ''popularity'', ''long-running''. Default: ''created'''
      direction:
        type: string
        description: '''asc'' or ''desc''. Default: ''desc'''
      per_page:
        type: integer
        description: Results per page (max 100)
      page:
        type: integer
        description: Page number
      owner:
        type: string
        description: Repository owner
      repo:
        type: string
        description: Repository name
    required:
    - owner
    - repo
response:
  success_codes:
  - 200
tags:
- development
- git
