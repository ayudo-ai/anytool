# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: github_list_issues
app: github
description: List issues for a repository. Filter by state, labels, assignee, or sort order.
method: GET
path: /repos/{owner}/{repo}/issues
base_url: https://api.github.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      state:
        type: string
        description: '''open'', ''closed'', or ''all''. Default: ''open'''
      labels:
        type: string
        description: Comma-separated label names to filter by
      assignee:
        type: string
        description: Filter by assignee username. '*' for any, 'none' for unassigned
      sort:
        type: string
        description: '''created'', ''updated'', ''comments''. Default: ''created'''
      direction:
        type: string
        description: '''asc'' or ''desc''. Default: ''desc'''
      per_page:
        type: integer
        description: Results per page (max 100, default 30)
      page:
        type: integer
        description: Page number
      owner:
        type: string
        description: Repository owner
      repo:
        type: string
        description: Repository name
    required:
    - owner
    - repo
response:
  success_codes:
  - 200
tags:
- development
- git
