# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: github_list_workflow_runs
app: github
description: List recent workflow runs for a repository. Shows CI/CD pipeline status.
method: GET
path: /repos/{owner}/{repo}/actions/runs
base_url: https://api.github.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      status:
        type: string
        description: 'Filter: ''completed'', ''in_progress'', ''queued'', ''failure'', ''success'''
      branch:
        type: string
        description: Filter by branch name
      per_page:
        type: integer
        description: Results per page (max 100)
      owner:
        type: string
        description: Repository owner
      repo:
        type: string
        description: Repository name
    required:
    - owner
    - repo
response:
  success_codes:
  - 200
tags:
- development
- git
