# Auto-migrated from old spec format
# Review and enhance: add examples, refine body_schema nesting

name: github_create_issue
app: github
description: Create a new issue in a GitHub repository. Supports title, body, labels, assignees, and milestone.
method: POST
path: /repos/{owner}/{repo}/issues
base_url: https://api.github.com
auth:
  type: oauth2
  header: 'Authorization: Bearer {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      title:
        type: string
        description: Issue title
      body:
        type: string
        description: Issue body (Markdown supported)
      labels:
        type: array
        description: Label names, e.g. ['bug', 'urgent']
        items:
          type: string
      assignees:
        type: array
        description: GitHub usernames to assign, e.g. ['octocat']
        items:
          type: string
      milestone:
        type: integer
        description: Milestone number to associate with
      owner:
        type: string
        description: Repository owner (user or org)
      repo:
        type: string
        description: Repository name
    required:
    - title
    - owner
    - repo
response:
  success_codes:
  - 200
  - 201
  extract:
    number: issue_number
    id: issue_id
tags:
- development
- git
