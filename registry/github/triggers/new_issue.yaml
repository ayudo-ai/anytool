# ──────────────────────────────────────────────────────────────────────
# GitHub — New Issue Trigger
# Webhook-based: registers a GitHub webhook for issue events.
# ──────────────────────────────────────────────────────────────────────

trigger: github_new_issue
app: github
display_name: GitHub New Issue
description: |
  Fires when a new issue is created in the specified repository.
  Uses GitHub webhooks for real-time delivery.

mode: webhook
provider: github
events: [issues]

auth:
  type: oauth2
  scopes:
    - repo

config:
  type: object
  required: [owner, repo]
  properties:
    owner:
      type: string
      title: Repository Owner
      description: GitHub organization or username (e.g. octocat).
    repo:
      type: string
      title: Repository Name
      description: Repository name (e.g. anytool).

payload:
  type: object
  properties:
    action:
      type: string
      description: "Event action (opened, closed, reopened, etc.)"
    issue_number:
      type: integer
      description: Issue number
    title:
      type: string
      description: Issue title
    body:
      type: string
      description: Issue body (markdown)
    user:
      type: string
      description: GitHub username who created the issue
    labels:
      type: array
      items:
        type: string
      description: Labels on the issue
    url:
      type: string
      description: URL to the issue on GitHub

tags: [code, github, issues]
