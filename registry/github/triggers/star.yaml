# ──────────────────────────────────────────────────────────────────────
# GitHub — Star Trigger
# Webhook-based: fires when someone stars the repository.
# ──────────────────────────────────────────────────────────────────────

trigger: github_star
app: github
display_name: GitHub Star
description: |
  Fires when someone stars or unstars the repository.
  Uses GitHub webhooks for real-time delivery.

mode: webhook
provider: github
events: [star]

auth:
  type: oauth2
  scopes:
    - repo

config:
  type: object
  required: [owner, repo]
  properties:
    owner:
      type: string
      title: Repository Owner
      description: GitHub organization or username.
    repo:
      type: string
      title: Repository Name
      description: Repository name.

payload:
  type: object
  properties:
    action:
      type: string
      description: "created or deleted"
    user:
      type: string
      description: GitHub username who starred
    starred_at:
      type: string
      description: Timestamp of the star event

tags: [code, github, social]
