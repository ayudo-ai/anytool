name: calendly_cancel_event
app: calendly
version: "1"
description: "Cancel a scheduled event"
method: POST
path: /scheduled_events/{uuid}/cancellation
base_url: https://api.calendly.com
auth:
  type: bearer
  header: "Authorization: Bearer {access_token}"
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      uuid:
        type: string
        description: The uuid.
response:
  success_codes: [200]
tags: [calendly]
examples:
  - name: "Basic cancel event"
    request: {}
    response:
      status: success
