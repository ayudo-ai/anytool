method: GET
path: /members/me/boards
base_url: https://api.trello.com/1
auth:
  type: bearer
  header: 'Authorization: OAuth {access_token}'
request:
  content_type: application/json
  body_schema:
    type: object
    properties: {}
response:
  success_codes:
  - 200
tags:
- trello
examples:
- name: Basic list boards
  request: {}
  response:
    status: success
