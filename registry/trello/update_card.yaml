name: trello_update_card
app: trello
version: "1"
description: "Update a card"
method: PUT
path: /cards/{id}
base_url: https://api.trello.com/1
auth:
  type: bearer
  header: "Authorization: OAuth {access_token}"
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      id:
        type: string
        description: The id.
response:
  success_codes: [200]
tags: [trello]
examples:
  - name: "Basic update card"
    request: {}
    response:
      status: success
