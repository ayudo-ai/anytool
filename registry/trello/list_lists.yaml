name: trello_list_lists
app: trello
version: "1"
description: "List all lists on a board"
method: GET
path: /boards/{id}/lists
base_url: https://api.trello.com/1
auth:
  type: bearer
  header: "Authorization: OAuth {access_token}"
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      id:
        type: string
        description: The id.
response:
  success_codes: [200]
tags: [trello]
examples:
  - name: "Basic list lists"
    request: {}
    response:
      status: success
