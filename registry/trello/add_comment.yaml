name: trello_add_comment
app: trello
version: "1"
description: "Add a comment to a card"
method: POST
path: /cards/{id}/actions/comments
base_url: https://api.trello.com/1
auth:
  type: bearer
  header: "Authorization: OAuth {access_token}"
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      id:
        type: string
        description: The id.
response:
  success_codes: [200]
tags: [trello]
examples:
  - name: "Basic add comment"
    request: {}
    response:
      status: success
