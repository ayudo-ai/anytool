name: clickup_add_comment
app: clickup
version: "1"
description: "Add a comment to a task"
method: POST
path: /task/{task_id}/comment
base_url: https://api.clickup.com/api/v2
auth:
  type: bearer
  header: "Authorization: Bearer {access_token}"
request:
  content_type: application/json
  body_schema:
    type: object
    properties:
      task_id:
        type: string
        description: The task_id.
response:
  success_codes: [200]
tags: [clickup]
examples:
  - name: "Basic add comment"
    request: {}
    response:
      status: success
