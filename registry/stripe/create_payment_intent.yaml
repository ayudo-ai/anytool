  body_schema:
    type: object
    description: 'A PaymentIntent guides you through the process of collecting a payment from your customer.

      We recommend that you create exactly one PaymentIntent for each order or

      customer session in your system. You can reference the PaymentIntent later to

      see the history of payment attempts for a particular session.


      A PaymentIntent transitions through

      [multiple statuses](/payments/paymentintents/lifecycle)

      throughout its lifetime as it interfaces with Stripe.js to perform

      authentication flows and ultimately creates at most one successful charge.


      Related guide: [Payment Intents API](https://docs.stripe.com/payments/payment-intents)'
    properties:
      amount:
        type: integer
        description: Amount intended to be collected by this PaymentIntent. A positive integer representing how much to charge
          in the [smallest currency unit](https://docs.stripe.com/currencies#zero-decimal) (e.g., 100 cents to charge $1.00
          or 100 to charge ¥100, a zero-decimal currency). The minimum amount is $0.50 US or [equivalent in charge currency](https://docs.stripe.com/currencies#minimum-and-maximum-charge-amounts).
          The amount value supports up to eight digits (e.g., a value of 99999999 for a USD charge of $999,999.99).
      amount_capturable:
        type: integer
        description: Amount that can be captured from this PaymentIntent.
      amount_details:
        type: object
        description: ''
        properties:
          discount_amount:
            type: integer
            description: 'The total discount applied on the transaction represented in the [smallest currency unit](https://docs.stripe.com/currencies#zero-decimal).
              An integer greater than 0.


              This field is mutually exclusive with the `amount_details[line_items][#][discount_amount]` field.'
          error:
            type: object
          line_items:
            type: object
            description: A list of line items, each containing information about a product in the PaymentIntent. There is
              a maximum of 200 line items.
            properties:
              data:
                type: object
              has_more:
                type: object
              object:
                type: object
              url:
                type: object
            required:
