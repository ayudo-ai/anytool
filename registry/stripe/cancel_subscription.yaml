name: stripe_cancel_subscription
app: stripe
version: '1'
description: '<p>Cancels a customer’s subscription immediately. The customer won’t be charged again for the subscription.
  After it’s canceled, the subscription is largely immutable. You can still update its <a href="/metadata">metadata</a> and
  <code>cancellation_details</code>.</p>


  <p>Any pending invoice items that you’ve created are still charged at the end of the period, unless manually <a href="/api/invoiceitems/delete">deleted</a>.
  If you’ve set the subscription to cancel at the end of the period, any pending prorations are also left in place and collected
  at the end of the period. But if the subscription is set to cancel immediately, pending prorations are removed if <code>invoice_now</code>
  and <code>prorate</code> are both set to true.</p>


  <p>By default, upon subscription cancellation, Stripe stops automatic collection of all finalized invoices for the customer.
  This is intended to prevent unexpected payment attempts after the customer has canceled a subscription. However, you can
  resume automatic collection of the invoices manually after subscription cancellation to have us proceed. Or, you could check
  for unpaid invoices before allowing the customer to cancel the subscription at all.</p>'
